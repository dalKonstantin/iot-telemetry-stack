services:
  mongodb:
    image: mongo
    container_name: telemetry-mongodb
    ports:
      - "27017:27017"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongo_data:/data/db

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: telemetry-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./telemetry-gateway/deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  telemetry-gateway:
    build:
      context: ./telemetry-gateway
    container_name: telemetry-gateway
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  telemetry-gateway-frontend:
    build:
      context: ./telemetry-gateway-frontend
    container_name: telemetry-gateway-frontend
    ports:
      - "5173:80"
    environment:
      BACKEND_HOST: telemetry-gateway:8080
    depends_on:
      - telemetry-gateway
    restart: unless-stopped

volumes:
  mongo_data:
